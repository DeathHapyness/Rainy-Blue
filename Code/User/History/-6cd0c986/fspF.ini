[colors]
; Fundo transparente (85%)
background = #d91a1c23
background-alt = #3b4252
foreground = #d8dee9
; Azul Polar para Workspaces Ativos
primary = #5e81ac
; Azul Glacial para Ícones
secondary = #88c0d0
alert = #bf616a
disabled = #4c566a

[bar/main]
background = ${colors.background}
foreground = ${colors.foreground}
border-color = #00000000
line-size = 2pt
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

[module/xworkspaces]
type = internal/xworkspaces
label-active = " %name% "
label-active-background = ${colors.primary}
label-active-foreground = #ffffff
label-occupied-foreground = ${colors.secondary}
label-empty-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
label-volume = %{F#88c0d0}󰕾%{F-} %percentage%%

[module/memory]
type = internal/memory
label = %{F#88c0d0}%{F-} %used%

[module/cpu]
type = internal/cpu
label = %{F#88c0d0}%{F-} %percentage%%