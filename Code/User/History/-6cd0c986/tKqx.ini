[colors]
; Fundo: #d9 (85% opacidade) + 1a1c23 (asfalto profundo azulado)
background = #d91a1c23
; Background-alt: Cinza azulado para contraste
background-alt = #3b4252
; Texto principal: Branco gelo
foreground = #d8dee9
; Acento Primário: Azul Polar (Seleção e Destaque)
primary = #5e81ac
; Acento Secundário: Azul Glacial/Cyan (Ícones e Detalhes)
secondary = #88c0d0
; Alerta: Azul mais escuro ou borda
alert = #81a1c1
; Desativado: Cinza ardósia
disabled = #4c566a

[bar/main]
monitor = HDMI-A-0
width = 100%
height = 20pt
radius = 8
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 2pt
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Medium:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

modules-left = debian-icon workspaces
modules-center = music date updates
modules-right = pulseaudio memory cpu tray powermenu

cursor-click = pointer
enable-ipc = true
wm-restack = i3

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 65%

[module/debian-icon]
type = custom/text
format = 
; Ícone Debian em Azul Glacial
format-foreground = ${colors.secondary}
format-padding = 1
click-left = rofi -show drun

[module/workspaces]
type = custom/script
exec = ~/.config/polybar/scripts/workspaces.sh
interval = 1
format = <label>

[module/cava]
type = custom/script
tail = true
exec = ~/.local/bin/cava.sh
format = <label>
format-foreground = #88c0d0
format-background = ${colors.background}
format-padding = 1
label-font = 2

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = <label-volume>
; Ícone Azul Glacial, texto Branco Gelo
label-volume = %{F#88c0d0}󰕾%{F-} %percentage%%
format-muted = <label-muted>
label-muted = 󰝟
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol &

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = %{F#88c0d0}%{F-} %used%

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = %{F#88c0d0}%{F-} %percentage%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
format = <label>
label = %date%
label-foreground = ${colors.secondary}

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
interval = 600
click-left = ~/.config/polybar/scripts/updates.sh click

[module/powermenu]
type = custom/text
format = ""
; Botão Power em Azul Polar
format-foreground = ${colors.primary}
format-padding = 1
click-left = ~/.config/polybar/scripts/powermenu.sh

[module/music]
type = custom/script
exec = playerctl --player=spotify metadata --format '{{ title }} - {{ artist }}' 2>/dev/null || echo "Não tocando"
interval = 2
label-maxlen = 30
label-foreground = ${colors.secondary}

[settings]
screenchange-reload = true
pseudo-transparency = true