[colors]
background = #d91a1c23
background-alt = #3b4252
foreground = #d8dee9
primary = #5e81ac
secondary = #88c0d0
alert = #bf616a
disabled = #4c566a

[bar/main]
monitor = HDMI-A-0
width = 100%
height = 22pt
radius = 12
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 8pt
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = "JetBrainsMono Nerd Font:style=Medium:size=10;2"

modules-left = debian-icon xworkspaces
modules-center = date
modules-right = pulseaudio memory cpu tray

[module/xworkspaces]
type = internal/xworkspaces
label-active = " %name% "
label-active-background = ${colors.primary}
label-active-foreground = #ffffff
label-occupied = " %name% "
label-occupied-foreground = ${colors.secondary}
label-empty = " %name% "
label-empty-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
label-volume = %{F#88c0d0}󰕾%{F-} %percentage%%

[module/date]
type = internal/date
date = %H:%M
label = %date%
label-foreground = #88c0d0

[module/debian-icon]
type = custom/text
format = 
format-foreground = #88c0d0
format-padding = 1
click-left = rofi -show drun