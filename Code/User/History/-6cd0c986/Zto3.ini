[colors]
background = #d91a1c23
background-alt = #3b4252
foreground = #d8dee9
primary = #5e81ac
secondary = #88c0d0
alert = #bf616a
disabled = #4c566a

[bar/main]
monitor = HDMI-A-0
width = 100%
height = 20pt
radius = 12
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt
border-size = 8pt
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Medium:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

# O Cava voltou para cá!
modules-left = debian-icon xworkspaces cava
modules-center = music date
modules-right = pulseaudio memory cpu tray powermenu

cursor-click = pointer
enable-ipc = true
wm-restack = i3

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 65%

[module/debian-icon]
type = custom/text
format = 
format-foreground = ${colors.secondary}
format-padding = 1
click-left = rofi -show drun

[module/xworkspaces]
type = internal/xworkspaces
label-active = " %name% "
label-active-background = ${colors.primary}
label-active-foreground = #ffffff
label-occupied = " %name% "
label-occupied-foreground = ${colors.secondary}
label-urgent = " %name% "
label-urgent-background = ${colors.alert}
label-empty = " %name% "
label-empty-foreground = ${colors.disabled}

# Módulo do CAVA (Restaurado com cor azul)
[module/cava]
type = custom/script
tail = true
exec = ~/.local/bin/cava.sh
format = <label>
format-foreground = #88c0d0
format-padding = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = <label-volume>
label-volume = %{F#88c0d0}󰕾%{F-} %percentage%%
format-muted = <label-muted>
label-muted = 󰝟
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol &

[module/memory]
type = internal/memory
interval = 2
format = <label>
label = %{F#88c0d0}%{F-} %used%

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = %{F#88c0d0}%{F-} %percentage%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
format = <label>
label = %date%
label-foreground = ${colors.secondary}

[module/powermenu]
type = custom/text
format = ""
format-foreground = ${colors.primary}
format-padding = 1
click-left = ~/.config/polybar/scripts/powermenu.sh

[module/music]
type = custom/script
exec = playerctl --player=spotify metadata --format '{{ title }} - {{ artist }}' 2>/dev/null || echo "Não tocando"
interval = 2
label-maxlen = 30
label-foreground = #5e81ac

[settings]
screenchange-reload = true
pseudo-transparency = true