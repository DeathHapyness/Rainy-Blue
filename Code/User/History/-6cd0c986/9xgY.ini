[colors]
background = #aa050709
background-alt = #cc1a232b
foreground = #cdd6f4
primary = #4c6a85
secondary = #2d4154
alert = #d16b7c
disabled = #5a6470

[bar/main]
monitor = HDMI-A-0
width = 100%
height = 20pt
radius = 12
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 8pt
border-color = #00000000

padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:style=Medium:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

modules-left = debian-icon xworkspaces module/cava
modules-center = music date
modules-right = pulseaudio memory cpu tray powermenu

cursor-click = pointer
enable-ipc = true
wm-restack = i3

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 65%

[module/debian-icon]
type = custom/text
format = 
format-foreground = #ffffff
format-padding = 1
click-left = rofi -show drun

[module/xworkspaces]
[module/xworkspaces]
type = internal/xworkspaces
label-active = " %name% "
label-active-background = ${colors.primary}
label-active-foreground = ${colors.background}
label-occupied = " %name% "
label-occupied-foreground = ${colors.foreground}
label-urgent = " %name% "
label-urgent-background = ${colors.alert}
label-empty = " %name% "
label-empty-foreground = ${colors.disabled}

[module/cava]
type = custom/script
tail = true
exec = ~/.local/bin/cava.sh
format = <label>
format-foreground = #BD93F9

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
format-muted = <label-muted>
label-muted = 󰝟
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol &

[module/memory]
type = internal/memory
interval = 2
format = <label>
label =  %used%

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label =  %percentage%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
format = <label>
label =   %date%

[module/powermenu]
type = custom/text
format = ""
format-foreground = #ffffff
format-padding = 1
click-left = ~/.config/polybar/scripts/powermenu.sh

[module/music]
type = custom/script
exec = playerctl --player=spotify metadata --format '{{ title }} - {{ artist }}' 2>/dev/null || echo "Não tocando"
interval = 2
label-maxlen = 30

[settings]
screenchange-reload = true
pseudo-transparency = true
