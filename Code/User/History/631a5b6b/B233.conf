# Backend & VSync
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-copy-from-front = false;

# Cantos Arredondados
corner-radius = 12;

# Sombras (Ajustadas para suavidade da cena)
shadow = true;
shadow-radius = 18;
shadow-opacity = 0.45;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-color = "#000000"; # Sombra profunda como o asfalto à noite

# Fading (Transições suaves)
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Blur (O toque de "Glassmorphism")
# Importante: Requer picom-pijulius ou picom-ftlabs para Dual Kawase
blur: {
  method = "dual_kawase";
  strength = 7;
  background = true;
  background-frame = false;
  background-fixed = false;
}

# Opacidade e Transparência
active-opacity = 0.90;
inactive-opacity = 0.85;
frame-opacity = 1.0;

opacity-rule = [
  "95:class_g = 'firefox'",
  "85:class_g = 'kitty'",
  "85:class_g = 'Rofi'",
  "85:class_g = 'Polybar'",
  "85:class_g = 'Thunar'"
];

# Animações (Mantendo seu estilo Zoom/Slide)
animations = true;
animation-stiffness = 200;
animation-dampening = 25;
animation-mass = 1;
animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-left";
animation-for-workspace-switch-out = "slide-right";

# Excluir blur de janelas que não precisam (Popups, menus de contexto)
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];