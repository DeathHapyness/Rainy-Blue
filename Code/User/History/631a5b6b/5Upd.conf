#################################
#             Backend           #
#################################
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-copy-from-front = false;
use-damage = true;

#################################
#           Corners             #
#################################
# Cantos arredondados para combinar com a estética moderna
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#            Shadows            #
#################################
# Sombras suaves que imitam a luz difusa da cena de chuva
shadow = true;
shadow-radius = 20;
shadow-opacity = 0.40;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#000000";

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#            Fading             #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#   Transparency / Opacity      #
#################################
active-opacity = 0.90;
inactive-opacity = 0.85;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g = 'firefox'",
  "85:class_g  = 'kitty'",
  "85:class_g  = 'Rofi'",
  "85:class_g  = 'Polybar'",
  "85:class_g  = 'Thunar'",
  "85:class_g  = 'Pavucontrol'"
];

#################################
#             Blur              #
#################################
# Efeito Glassmorphism (Requer Picom-ftlabs ou Pijulius)
blur: {
  method = "dual_kawase";
  strength = 7;
  background = true;
  background-frame = false;
  background-fixed = false;
}

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#          Animations           #
#################################
# Animações baseadas no estilo Zoom/Slide
animations = true;
animation-stiffness = 200;
animation-dampening = 25;
animation-window-mass = 1.0;
animation-clamping = true;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";
animation-for-workspace-switch-in = "slide-left";
animation-for-workspace-switch-out = "slide-right";

#################################
#       General Settings        #
#################################
mark-wmwin-focused = true;
mark-ovlptr-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
glx-no-rebind-pixmap = true;